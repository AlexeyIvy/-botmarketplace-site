name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @botmarketplace/api exec prisma generate

      - name: Typecheck API
        run: pnpm --filter @botmarketplace/api exec tsc --noEmit

      - name: Build Web
        run: pnpm build:web

      - name: Run API tests
        run: pnpm test:api

      - name: Check stray TS artifacts
        run: pnpm check:stray

      - name: Security audit (fail on critical)
        run: pnpm audit --prod --audit-level=critical
